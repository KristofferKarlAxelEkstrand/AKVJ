name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint-and-build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Validate clips
              run: npm run clips -- --validate-only

            # Skip extra post-validation check for generated public clips — build will fail if files are missing

            - name: Lint JavaScript
              run: npm run lint

            - name: Lint CSS
              run: npx stylelint "**/*.css"

            - name: Check formatting (prettier)
              run: npx prettier --check .

            - name: Check line endings (LF only)
              run: npm run check:eol

            - name: Check UTF-8 encoding
              run: npm run check:utf8

            # The `format:prettier` script runs Prettier with `--write` which is not compatible
            # with `--check`. We already validate formatting with `npx prettier --check .` above,
            # so remove the redundant/incorrect script invocation.

            - name: Run tests
              run: npm run test

            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium

            - name: Run visual tests
              run: npm run test:visual

            - name: Build (generate clips + vite build)
              run: npm run build:full

            - name: Verify public clips generated
              run: |
                  if [ ! -d "src/public/clips" ] || [ -z "$(find src/public/clips -type f \( -name '*.png' -o -name '*.json' \) -print -quit)" ]; then
                    echo "::error::No generated clip files found in src/public/clips/. Build step should generate these files."
                    exit 1
                  fi
