name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint-and-build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Validate clips
              run: npm run clips:validate

            - name: Lint JavaScript
              run: npm run lint

            - name: Lint CSS
              run: npx stylelint "**/*.css"

            - name: Check formatting (prettier)
              run: npx prettier --check .

            - name: Check line endings (LF only)
              run: npm run check:eol

            - name: Check UTF-8 encoding
              run: npm run check:utf8

            - name: Run all workspace tests
              run: npm run test:all

            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium

            - name: Run visual tests
              run: npm run test:visual

            - name: Run E2E tests
              run: npm run test:e2e

            - name: Build all packages
              run: npm run build:all

            - name: Verify public clips generated
              run: |
                  if [ ! -f "akvj/src/public/clips/clips.json" ] || [ ! -f "akvj/src/public/clips/set-mapping.json" ]; then
                    echo "::error::Missing clips.json or set-mapping.json in akvj/src/public/clips/."
                    exit 1
                  fi
                  if [ -z "$(find akvj/src/public/clips -type f -name '*.png' -print -quit)" ]; then
                    echo "::error::No generated PNG clip files found in akvj/src/public/clips/."
                    exit 1
                  fi
